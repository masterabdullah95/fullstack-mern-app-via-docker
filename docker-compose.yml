version: "3,.9"

services:
  server:
    build: ./express-container
    container_name: express-container
    ports:
      - "3000:3000"
    networks:
      - fullstack-net
    restart: unless-stopped
  client: 
    build: ./react-container
    container_name: react-container
    ports:
      - "5173:3000"
    networks:
      - fullstack-net
    depends_on:
      - server
    restart: unless-stopped
networks:
  fullstack-net:
    driver: bridge